<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우테코 미션 제출 가이드</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="./style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>
  <div id="app">
    <header id="guide-header">
      <div class="header-inputs">
        <input id="input-user-me" type="text" placeholder="내 github id" />
        <input id="input-user-pair" type="text" placeholder="페어 github id" />
        <input id="input-repo" type="text" placeholder="우테코 미션 레포 URL" />
      </div>
    </header>

    <div id="layout">
      <div id="card-container">
      </div>

      <div id="content-area">
        <div class="blur-bg blur-top"></div>
        <div class="blur-bg blur-bottom"></div>

        <div class="mac-window">
          <div class="window-bar">
            <div class="window-dots">
              <span class="dot red"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
            </div>
            <span class="window-title">woowahan-tech-course</span>
            <div class="window-dots-placeholder"></div>
          </div>
          <div class="window-body"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./scripts/main.js"></script>
</body>

</html>
